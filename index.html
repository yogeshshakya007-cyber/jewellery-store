<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Jewellery Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 font-sans">

    <!-- Header / Navigation -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-yellow-600 tracking-wider">YOGESH JEWELLERS</h1>
            <nav class="hidden md:flex space-x-8">
                <a href="#" class="text-gray-600 hover:text-yellow-600 font-medium">Home</a>
                <a href="#" class="text-gray-600 hover:text-yellow-600 font-medium">Collections</a>
                <a href="#" class="text-gray-600 hover:text-yellow-600 font-medium">About Us</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="text-center mb-12">
            <h2 class="text-3xl md:text-4xl font-extrabold text-gray-900 mb-4">Our Latest Collection</h2>
            <p class="text-gray-500 max-w-2xl mx-auto">Explore our exclusive range of premium jewelry, crafted with elegance and perfection just for you.</p>
        </div>

        <!-- Products Grid -->
        <div id="product-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <div class="col-span-full text-center py-10">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-yellow-600"></div>
                <p class="mt-2 text-gray-500">Loading beautiful collections...</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white py-8 mt-12 text-center">
        <p>&copy; 2026 Yogesh Jewellers. All rights reserved.</p>
    </footer>

    <!-- Full Image Modal (बड़ी फोटो दिखाने वाला पॉपअप) -->
    <div id="imageModal" class="hidden fixed inset-0 z-[100] bg-black bg-opacity-90 flex justify-center items-center p-4">
        <!-- Close Button -->
        <span class="absolute top-5 right-5 text-white text-5xl cursor-pointer hover:text-gray-300 z-[101]" onclick="closeImage()">&times;</span>
        <!-- Big Image -->
        <img id="fullImage" class="max-w-full max-h-full object-contain rounded-lg shadow-2xl relative z-[100]">
    </div>

    <!-- Javascript Code -->
    <script>
        const supabaseUrl = 'https://fzzwioyhmuanfvpotfit.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6endpb3lobXVhbmZ2cG90Zml0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4MDAxODYsImV4cCI6MjA5OTM3NjE4Nn0.y-eyWjY4oO8PbpiARC4RVy48256QUHfYn4BOZi2DdSQ'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // 1. प्रोडक्ट लोड करने का फंक्शन
        async function loadProducts() {
            const container = document.getElementById('product-list');
            try {
                const { data, error } = await supabase.from('products').select('*').order('id', { ascending: false });
                if (error) throw error;
                if (!data || data.length === 0) {
                    container.innerHTML = '<div class="col-span-full text-center text-gray-500 py-10 font-bold">अभी कोई प्रोडक्ट उपलब्ध नहीं है।</div>';
                    return;
                }

                container.innerHTML = '';
                data.forEach(product => {
                    // यहाँ मैंने Add to Cart और Image click के फंक्शन जोड़ दिए हैं
                    const card = `
                        <div class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-shadow duration-300 group border border-gray-100">
                            <div class="relative h-64 overflow-hidden bg-gray-100 flex justify-center items-center cursor-pointer" onclick="openImage('${product.image_url}')">
                                <img src="${product.image_url}" alt="${product.name}" class="w-full h-full object-cover object-center group-hover:scale-105 transition-transform duration-500">
                                <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-10 transition-all duration-300 flex items-center justify-center">
                                    <span class="text-white opacity-0 group-hover:opacity-100 bg-black bg-opacity-50 px-3 py-1 rounded-full text-sm">👁️ View</span>
                                </div>
                            </div>
                            <div class="p-5">
                                <h3 class="text-lg font-semibold text-gray-800 mb-1 truncate">${product.name}</h3>
                                <p class="text-xl text-yellow-600 font-bold mb-4">₹${product.price}</p>
                                <button onclick="addToCart('${product.name}')" class="w-full bg-gray-900 text-white font-medium py-2.5 rounded-lg hover:bg-yellow-600 transition-colors duration-300 cursor-pointer">
                                    Add to Cart
                                </button>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            } catch (error) {
                container.innerHTML = `<div class="col-span-full text-center text-red-600 font-bold py-10">Error: ${error.message}</div>`;
            }
        }

        // 2. बड़ी फोटो खोलने का फंक्शन
        function openImage(imgUrl) {
            document.getElementById('fullImage').src = imgUrl;
            document.getElementById('imageModal').classList.remove('hidden');
        }

        // 3. बड़ी फोटो बंद करने का फंक्शन
        function closeImage() {
            document.getElementById('imageModal').classList.add('hidden');
        }

        // 4. Add to Cart बटन का फंक्शन
        function addToCart(productName) {
            // अभी के लिए यह एक पॉपअप मैसेज दिखाएगा
            alert("🛒 " + productName + " आपके कार्ट में सफलतापूर्वक जुड़ गया है!");
        }

        window.onload = loadProducts;
    </script>
</body>
</html>
