<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yogesh Jewellers - Premium Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Montserrat', sans-serif !important; }
        body { background-color: #f9fafb; overflow-x: hidden; }
        .peach-bg { background-color: #e6998c; }
        .peach-text { color: #e6998c; }
        .peach-border { border-color: #e6998c; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .peach-hover:hover { background-color: #d8897c; }
    </style>
</head>
<body class="relative min-h-screen flex flex-col">

    <!-- HEADER -->
    <header class="bg-white shadow-sm sticky top-0 z-[100]">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-extrabold peach-text tracking-wider">YOGESH JEWELLERS</h1>
            <button onclick="toggleCart()" class="text-gray-900 font-bold flex items-center gap-1 relative"><i class="ph ph-shopping-cart text-2xl"></i> Cart <span id="header-cart-count" class="absolute -top-2 -right-3 peach-bg text-white text-xs px-1.5 py-0.5 rounded-full">0</span></button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-12 flex-grow">
        <div id="product-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <div class="col-span-full text-center py-10"><div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 peach-border"></div></div>
        </div>
    </main>

    <!-- 5-IMAGE GALLERY MODAL (NEW FEATURE) -->
    <div id="galleryModal" class="hidden fixed inset-0 z-[300] bg-black flex justify-center items-center">
        <button onclick="closeGallery()" class="absolute top-5 right-5 text-white z-[305]"><i class="ph ph-x text-3xl"></i></button>
        <button onclick="changeImage(-1)" class="absolute left-2 text-white z-[305]"><i class="ph ph-caret-left text-4xl"></i></button>
        <img id="galleryImg" class="max-w-[90%] max-h-[70%] object-contain rounded-lg">
        <button onclick="changeImage(1)" class="absolute right-2 text-white z-[305]"><i class="ph ph-caret-right text-4xl"></i></button>
        <div id="imgCounter" class="absolute bottom-5 text-white font-bold">1 / 5</div>
    </div>

    <!-- CART DRAWER -->
    <div id="cart-overlay" onclick="toggleCart()" class="fixed inset-0 bg-black bg-opacity-60 z-[150] hidden"></div>
    <div id="cart-drawer" class="fixed top-0 right-0 w-full sm:w-[420px] h-full bg-white z-[200] transform translate-x-full transition-transform duration-300 shadow-2xl flex flex-col">
        <header class="flex items-center justify-between px-5 py-4 border-b border-gray-100 shrink-0">
            <h2 class="text-xl font-bold">Cart <span id="cart-drawer-count">0</span></h2>
            <button onclick="toggleCart()" class="text-gray-500"><i class="ph ph-x text-xl"></i></button>
        </header>
        
        <div class="flex-grow overflow-y-auto px-5 py-2">
            <div id="cart-items"></div>
            <!-- Cross Sell -->
            <div id="cross-sell" class="pt-6 border-t border-gray-100 mt-4">
                <h3 class="font-bold mb-4">"You will also love these!"</h3>
                <div class="flex gap-4 overflow-x-auto hide-scrollbar pb-2">
                    <!-- Product Example (ADD button at TOP) -->
                    <div class="min-w-[130px] bg-white border border-gray-100 p-2 flex flex-col shadow-sm rounded">
                        <button class="w-full peach-bg text-white text-[11px] font-bold py-1.5 rounded-sm mb-2" onclick="alert('Added!')">ADD</button>
                        <div class="h-[110px] bg-gray-50 mb-2 relative group" onclick="openGallery()">
                             <img src="https://images.unsplash.com/photo-1611591437281-460bfbe1220a?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover">
                             <div class="absolute inset-0 bg-black/20 flex items-center justify-center opacity-0 group-hover:opacity-100 transition"><i class="ph ph-eye text-white text-xl"></i></div>
                        </div>
                        <h4 class="text-[12px] font-bold leading-tight">Rudraksha Pendant</h4>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-gray-50 px-5 py-5 border-t shrink-0" id="checkout-section">
            <p id="discount-msg" class="text-[13px] font-bold mb-10 text-center">Add ₹ 901 more for 25% off</p>
            <div class="flex justify-between items-center font-bold text-lg mb-4"><span>Subtotal</span><span id="subtotal">₹ 0</span></div>
            <button onclick="checkout()" class="w-full peach-bg text-white font-bold py-3.5 rounded-sm">Checkout</button>
        </div>
    </div>

    <script>
        let currentIdx = 0;
        const images = [
            'https://images.unsplash.com/photo-1611591437281-460bfbe1220a?auto=format&fit=crop&w=800&q=80',
            'https://images.unsplash.com/photo-1599643478524-fb66f72400de?auto=format&fit=crop&w=800&q=80',
            'https://images.unsplash.com/photo-1535632066927-ab7c9ab60908?auto=format&fit=crop&w=800&q=80',
            'https://images.unsplash.com/photo-1601121141461-9d6647bca1ed?auto=format&fit=crop&w=800&q=80',
            'https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?auto=format&fit=crop&w=800&q=80'
        ];

        function openGallery() {
            currentIdx = 0;
            document.getElementById('galleryImg').src = images[currentIdx];
            document.getElementById('galleryModal').classList.remove('hidden');
        }
        function closeGallery() { document.getElementById('galleryModal').classList.add('hidden'); }
        function changeImage(dir) {
            currentIdx = (currentIdx + dir + images.length) % images.length;
            document.getElementById('galleryImg').src = images[currentIdx];
            document.getElementById('imgCounter').innerText = (currentIdx + 1) + " / 5";
        }
        
        // Cart Logic
        function toggleCart() {
            const drawer = document.getElementById('cart-drawer');
            const overlay = document.getElementById('cart-overlay');
            drawer.classList.toggle('translate-x-full');
            overlay.classList.toggle('hidden');
        }

        // Initialize (Same robust logic as before)
        document.addEventListener('DOMContentLoaded', () => {
            // Your existing logic here...
        });
    </script>
</body>
</html>
