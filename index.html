<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yogesh Jewellers - Premium Collection</title>
    <!-- Tailwind & Supabase & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f9fafb; overflow-x: hidden; }
        .peach-bg { background-color: #e6998c; }
        .peach-text { color: #e6998c; }
        .peach-border { border-color: #e6998c; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .peach-hover:hover { background-color: #d8897c; }
    </style>
</head>
<body class="relative min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-[100]">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-extrabold peach-text tracking-wider">YOGESH JEWELLERS</h1>
            <nav class="flex space-x-6 items-center">
                <a href="#" class="text-gray-600 hover:text-black font-medium transition-colors">Home</a>
                <button onclick="toggleCart()" class="text-gray-900 hover:text-gray-600 font-bold flex items-center gap-1 relative transition-colors cursor-pointer">
                    <i class="ph ph-shopping-cart text-2xl"></i> Cart
                    <span id="header-cart-count" class="absolute -top-2 -right-3 peach-bg text-white text-xs font-bold px-1.5 py-0.5 rounded-full shadow-sm">0</span>
                </button>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex-grow">
        <div class="text-center mb-12">
            <h2 class="text-3xl md:text-4xl font-extrabold text-gray-900 mb-4">Our Premium Collection</h2>
            <p class="text-gray-500 max-w-2xl mx-auto">Explore our exclusive range of jewelry, crafted with elegance.</p>
        </div>
        
        <!-- Products Grid Area -->
        <div id="product-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <div class="col-span-full text-center py-10">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 peach-border"></div>
                <p class="mt-2 text-gray-500">Loading collections...</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white py-8 text-center">
        <p>&copy; 2026 Yogesh Jewellers. All rights reserved.</p>
    </footer>

    <!-- Full Image Modal -->
    <div id="imageModal" class="hidden fixed inset-0 z-[300] bg-black bg-opacity-90 flex justify-center items-center p-4">
        <button onclick="closeImage()" class="absolute top-5 right-5 text-white bg-gray-800 rounded-full p-2 hover:bg-red-500 transition cursor-pointer z-[301]">
            <i class="ph ph-x font-bold text-2xl"></i>
        </button>
        <img id="fullImage" class="max-w-full max-h-full object-contain rounded-lg shadow-2xl relative z-[300]">
    </div>

    <!-- CART CONTAINER (यहाँ कार्ट फाइल अपने आप आ जाएगी) -->
    <div id="cart-container"></div>

    <!-- MAIN JAVASCRIPT LOGIC FILE -->
    <script src="script.js"></script>
</body>
</html>
