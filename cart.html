<!-- Dark Overlay Backdrop -->
<div id="cart-overlay" onclick="toggleCart()" class="fixed inset-0 bg-black bg-opacity-60 z-[150] hidden transition-opacity"></div>

<!-- Cart Drawer (साइडबार) -->
<div id="cart-drawer" class="fixed top-0 right-0 w-full sm:w-[420px] h-full bg-white z-[200] transform translate-x-full transition-transform duration-300 shadow-2xl flex flex-col">
    
    <header class="flex items-center justify-between px-5 py-4 border-b border-gray-100 bg-white">
        <div class="flex items-center gap-3">
            <button onclick="toggleCart()" class="text-gray-600 hover:text-black"><i class="ph ph-list text-2xl"></i></button>
            <h2 class="text-xl font-bold text-gray-900 flex items-center gap-1">
                Cart <span id="cart-drawer-count" class="text-gray-400 font-normal text-lg">0</span>
            </h2>
        </div>
        <button onclick="toggleCart()" class="w-8 h-8 flex items-center justify-center bg-gray-100 rounded-full text-gray-600 hover:bg-gray-300 transition cursor-pointer">
            <i class="ph ph-x font-bold"></i>
        </button>
    </header>

    <div class="peach-bg text-white text-sm font-medium py-2.5 px-4 flex justify-between items-center">
        <i class="ph ph-caret-left text-lg"></i>
        <span>Extra 5% off on Prepaid Orders</span>
        <i class="ph ph-caret-right text-lg"></i>
    </div>

    <div id="cart-items" class="px-5 py-2 flex-grow overflow-y-auto hide-scrollbar bg-white"></div>

    <div id="cross-sell" class="px-5 py-6 border-t border-gray-100 hidden bg-white">
        <h3 class="text-center font-bold text-gray-800 mb-4">"You will also love these!"</h3>
        <div class="flex gap-4 overflow-x-auto hide-scrollbar pb-2">
            <div class="min-w-[140px] border border-gray-100 bg-gray-50 p-2 rounded flex flex-col">
                <div class="h-32 bg-gray-200 mb-2 rounded overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1599643478524-fb66f72400de?q=80&w=400&auto=format&fit=crop" class="w-full h-full object-cover">
                </div>
                <h4 class="text-xs font-bold text-gray-800 leading-tight mb-1 h-8 overflow-hidden">Premium Rudraksha Chain</h4>
                <div class="flex gap-1 text-xs mb-3"><span class="font-bold text-gray-800">₹ 399</span><span class="text-gray-400 line-through">₹ 449</span></div>
                <button class="w-full peach-bg text-white text-xs font-bold py-2 rounded mt-auto" onclick="toggleCart()">ADD</button>
            </div>
        </div>
    </div>

    <div class="bg-gray-50 px-5 py-5 border-t border-gray-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]" id="checkout-section">
        <div class="mb-5">
            <p id="discount-msg" class="text-sm font-medium text-gray-800 mb-3 text-center">Add ₹ 901 more Item and get extra 15% off</p>
            <div class="relative w-full h-1.5 bg-gray-300 rounded-full mb-1 mt-6">
                <div id="progress-fill" class="absolute top-0 left-0 h-full bg-black rounded-full transition-all duration-500" style="width: 0%;"></div>
                <div class="absolute -top-3 left-[60%] flex flex-col items-center">
                    <i class="ph ph-rosette-discount text-xl text-black bg-gray-50 rounded-full"></i>
                    <span class="text-[10px] text-gray-600 mt-1 whitespace-nowrap">₹ 1,500</span>
                </div>
                <div class="absolute -top-3 right-0 flex flex-col items-center">
                    <i class="ph ph-rosette-discount text-xl text-black bg-gray-50 rounded-full"></i>
                    <span class="text-[10px] text-gray-600 mt-1 whitespace-nowrap">₹ 2,500</span>
                </div>
            </div>
        </div>
        <div class="flex justify-between items-center text-sm text-gray-600 mt-8 mb-2 border-t border-gray-200 pt-4">
            <span>Shipping</span>
            <span>CALCULATED AT CHECKOUT</span>
        </div>
        <div class="flex justify-between items-center font-bold text-gray-900 text-lg mb-4">
            <span>Subtotal</span>
            <span id="subtotal">₹ 0</span>
        </div>
        <button onclick="checkout()" class="w-full peach-bg peach-hover text-white font-bold text-lg py-3.5 rounded shadow-md transition">
            Checkout
        </button>
    </div>
</div>
