<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jewellery Store - Premium Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 p-4 font-sans">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg overflow-hidden md:max-w-2xl p-6 mt-10 border border-gray-100">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center border-b pb-4">Seller Dashboard<br><span class="text-sm font-normal text-gray-500">Add New Jewellery Design</span></h2>
        
        <div id="message" class="hidden mb-4 p-3 rounded text-center font-bold text-sm"></div>

        <form id="add-product-form" class="space-y-5">
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Product Name (गहने का नाम)</label>
                <input type="text" id="name" required class="border border-gray-300 rounded-lg w-full py-2.5 px-3 text-gray-700 focus:outline-none focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500" placeholder="e.g. Premium Royal Ring">
            </div>
            
            <div>
                <label class="block text-gray-700 text-sm font-bold mb-2">Price (कीमत ₹ में)</label>
                <input type="number" id="price" required class="border border-gray-300 rounded-lg w-full py-2.5 px-3 text-gray-700 focus:outline-none focus:border-yellow-500 focus:ring-1 focus:ring-yellow-500" placeholder="e.g. 1499">
            </div>
            
            <div class="bg-gray-50 p-4 rounded-lg border border-dashed border-gray-300">
                <label class="block text-gray-700 text-sm font-bold mb-2">Upload Image (फाइल मैनेजर से फोटो चुनें)</label>
                <input type="file" id="image_file" required class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-yellow-50 file:text-yellow-700 hover:file:bg-yellow-100 cursor-pointer">
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-yellow-600 hover:bg-yellow-700 text-white font-bold py-3 px-4 rounded-lg focus:outline-none shadow-md transition duration-200 flex justify-center items-center">
                <span>Upload & Save Product</span>
            </button>
        </form>
    </div>

    <script>
        document.getElementById('add-product-form').addEventListener('submit', async function(e) {
            e.preventDefault(); // यह पेज को रिफ्रेश होने से रोकेगा

            const submitBtn = document.getElementById('submit-btn');
            const msgDiv = document.getElementById('message');
            
            try {
                if (typeof window.supabase === 'undefined') {
                    throw new Error("डेटाबेस लिंक लोड नहीं हो पाया। कृपया पेज को एक बार रिफ्रेश करें।");
                }

                submitBtn.disabled = true;
                submitBtn.innerHTML = 'Uploading... ⏳';

                const supabaseUrl = 'https://fzzwioyhmuanfvpotfit.supabase.co';
                const supabaseKey = 'EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6endpb3lobXVhbmZ2cG90Zml0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4MDAxODYsImV4cCI6MjA5OTM3NjE4Nn0.y-eyWjY4oO8PbpiARC4RVy48256QUHfYn4BOZi2DdSQ'; 
                const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

                const name = document.getElementById('name').value;
                const price = document.getElementById('price').value;
                const fileInput = document.getElementById('image_file');
                const file = fileInput.files[0];

                if (!file) throw new Error("कृपया पहले कोई फोटो चुनें।");

                const fileExt = file.name.split('.').pop();
                const fileName = Date.now() + '.' + fileExt;

                // 1. फोटो अपलोड करना
                const { error: uploadError } = await supabase.storage.from('product-images').upload(fileName, file);
                if (uploadError) throw uploadError;

                // 2. फोटो का लिंक लेना
                const { data: { publicUrl } } = supabase.storage.from('product-images').getPublicUrl(fileName);

                // 3. डेटाबेस में नाम, कीमत और फोटो का लिंक सेव करना
                const { error: insertError } = await supabase.from('products').insert([{ name: name, price: price, image_url: publicUrl }]);
                if (insertError) throw insertError;

                msgDiv.textContent = "Product Live Successfully! 🎉";
                msgDiv.className = "mb-4 p-3 rounded-lg text-center font-bold bg-green-100 text-green-700 block border border-green-200";
                document.getElementById('add-product-form').reset();

            } catch (error) {
                msgDiv.textContent = "Error: " + error.message;
                msgDiv.className = "mb-4 p-3 rounded-lg text-center font-bold bg-red-100 text-red-700 block border border-red-200";
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Upload & Save Product';
            }
        });
    </script>
</body>
</html>
